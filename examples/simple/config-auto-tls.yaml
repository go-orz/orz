log:
  level: "info"
  filename: "logs/app.log"
  encode: "console"
  console: true
  maxSize: 100
  maxAge: 7
  compress: true

database:
  enabled: true
  type: "sqlite"
  showSql: true
  sqlite:
    path: "data/app.db"

server:
  addr: ":443"                     # HTTPS标准端口
  tls:
    enabled: true                  # 启用TLS
    auto: true                     # 自动获取Let's Encrypt证书
    cert: ""                       # 自动TLS时无需配置
    key: ""                        # 自动TLS时无需配置
  ipExtractor: "X-Forwarded-For"   # IP提取方式
  ipTrustList:                     # 可信代理 IP/CIDR 列表
    - "127.0.0.1"
    - "::1"

app:
  name: "ORZ Auto TLS Example"
  version: "1.0.0"
